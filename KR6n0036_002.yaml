body:
  text: 智周撰第三卷燈約俱時難至亦是相符者此意說云若言通難新舊二師故有此失約俱前後思准曰知燈得通三世至應非無常者問西明前文云滅相依過去即云謂非今申正理如何乃言滅相依三世假立耶答西明依無立滅相所以破之今依曾有當有義理所以依三世立假相或西明滅相但在過去不通三世所以破之今通三世假立故無違也又云汝者此意宗中言無為相著汝言即自宗無相違失燈相似相續者此師依義立名所相是色能相還是色攝也燈又如堅等地等而相者界者性義意云地用堅為性相也燈非說色時此誰之色者此意說者而但可生是誰生不得說言色是誰色燈住異文中以影略故瑜伽文中但明生滅通於三世不說住異以舉一隅令三反故若不爾前二通三者有何所以燈如飢渴觸體即老死亦爾依觸分位而假建立無有別體燈數論相滅者彼計法體是常不滅相有隱顯名轉變滅若通生滅差別過去所作之因而是其生若無歸其常亦名滅寂之與因俱是常而有別燈前未破故者論文之中先未破他如何得言義如前破燈今云彼量是因中相違等者所言量者須前要集假敘者是應更檢彼集所說燈誰許聲體立法處等者大乘自宗屈曲聲體是離聲在於法處故云誰許燈然西明云至別有法處自性者別有名句等之自性此名句文法處攝故故云別有法處自性燈即長短等至法處所攝等者長短等上生等法亦名長等法前法總言應異色處別有法處即犯相符此生等相他亦許在法處攝故燈在聲不在非詮等者他意說云別此名等不別生於非詮名為差別故今非云但在於聲不在非詮餘別知燈誰言一極微二大造所等者一極微者極微聲二大造者內大外大不許因多果小果多因小彼即不障故為此極微助緣名因俱聲不說二造方名因俱燈便善那者此云顯義扇由扇顯得有風二相好表顯此人是福德也三根顯具足根故表顯非不男也四味自解燈何能自悟者真現比非迷妄執別言二量而能自悟二似妄執亦二量收如何得二似二量自悟是迷妄故燈餘二增上俱通士用者非擇虗名為餘二三種無上為並通士用名為俱通婆多師唯立三種故不言餘燈未有漏熏但由第六者其第七識為中不緣無為未熏彼種至無漏能緣者用由第六引燈本及至真如是實者本質即是法性真如即是亦八中應更審思燈或由定者想受唯定不動非定不要得定方能離於苦樂受等一唯是定一非唯定故今兩種燈次或二為非染為者依假立為通善不善名為二為別通無記名非染為燈問擇至何不許然者此問意云隨其煩惱不生之處而即立為擇滅苦樂等處於下三種立不能何不於此下三種中立想受滅要第四定方立彼耶燈答據究竟斷至據顯如齊解者此答意下三既能分顯於下非擇亦合立餘三例知燈以前答他等者即彼論中前答他雜又言除佛別等者是彼答意餘可思准燈為緣故名轉者問前問雙標引轉緣今者何故但漸緣縛答影故爾燈不同三相者此遮意云而不得亦三相為例論文同說因相違於種現二故燈五七不能現彼種相者現種種相名果能反五七不能現彼所熏之種相故云非果反燈此中意說至種種相者自證所現見相二分亦種種相燈於二位等者即染淨位名為二位今更釋云我愛執藏善惡業感名為二位應撿要集燈故頌遍說者彼說意云據二位所以頌中了細明第八異熟燈不可知即二行相者所緣行相二之相也疏應可知燈云雜染至亦無因緣者彼師意云能藏所藏據因緣義約後二釋不是緣故不為正應撿彼說燈證阿賴耶等者彼論對他成立第八由他不信引證而立應撿彼論方悉本意燈經部種亦應如是者此難意云若以種以種子名賴耶者經部亦許雜染之種子應名賴耶燈以第二句釋第一句即第三卷攝論頌云由攝藏諸法一切種子識以彼引此以為證也若執現識不應之亦者彼師意云若具能藏即是種子執藏為我即執現故牒難也燈不同二障者此應意云所知雖同一種有多差別說二殊三相既無不可為例餘可准知燈若離如是至定不可得者唯阿賴耶與諸轉識及第八識攝內外種今生現行等是但有因除此外皆非此攝燈此遍生五門有染者四諦修道名為五彼宗集滅見俱有二故集諦中四為遍行當撿但舍燈以現貪等緣嗔等熏成於種後能生於餘嗔等法遍行因貪等種子而非非遍故名遍行曰生因因者因明疏第一廣明燈名與小同義意有別者大乘所說次前是大乘所談如何俱舍等云辨引故燈從舊因生等者雖無異熟從無漏生亦名為果為因可知燈若爾自相中果相等者此難意云果相是異熟佛果自相所攝所攝果相從舊因生名為果相所以應例燈若親因生至無自相故者此難意云果相是異熟佛果自相所攝果相從舊因生名為果相所以應別燈若離因生至無自相故者此意說云離親因生等是自相燈定通證等者本疏引教意證法爾無漏種子不欲通證餘說本疏有通證言是得借本燈謂如如依止阿賴耶識者此意說云一切種子互等同依阿賴耶云如如者相似義應撿大論燈即熏種者熏八識識種而不唯熏第八識種亦非轉識但熏自餘故言熏八燈影顯生現持諸熏習等者此意說且言持識與種子識而為因緣影取轉識與現第八亦為因緣燈若至現增至非剎那滅者此難意云若至現在業種子增此異熟果應至後念經二剎那而方始成何以故留持業種以為增故燈然現善惡至現以增故者此意說云難云善惡增於果種但現行業非業種增由現業增故不須種燈若許與力何不生現者此是他難他難意云若言現業與果種力種如何不即生現燈即增上果假立彼名者今且釋云十王果等望無分別是增上果而假說言無分別惑應撿彼論方悉求意燈若是有漏豈為對治者要集解彼攝論文云無分別者而是有漏無分別智故為此難燈由此資熏餘有漏業等者由此無漏無分別種資有漏業而方能感十王等果報此燈主釋燈不說治至各言無記者此釋前言無治道者准此無記而無治道燈若說隨果至應非種子等者西明意云由論說言隨果轉等所以生現不生現時皆名種子若無此文即未生現種子何故非果俱故為有此文不生現者亦得種名燈於異熟蘊及加行別者異熟無記名異熟蘊但逢於緣而加行心各別而緣名加行別更撿彼論燈老死位等者即生位當死之時或從足下論觸而起或從須上論觸而生名為漸死燈若二種子者內外二種名二種燈若定如論不應說別者若如唯識瑜伽等文不應論生為引因彼等論中不說生等者生引故今以義准而展轉他亦無其失燈漸次第作等者此意說云十二緣支次第相緣皆得名為生引二因燈熏習能詮者意云呼熏習名言是能詮即是聲名句名為能詮既熏習言何為所詮熏習此論謂依彼法何等文自解燈何為所詮等者即是種子名為所詮應撿彼論燈以影互明故者顯揚攝論即影明也顯揚破彼小乘五因而非因緣不言自宗五種因中並無因緣攝論據自而異門中說通因緣不言小乘五因之中而有因緣名影顯也燈評取初解者此燈中總是第一解意也疏中有二解疏主自許取此第一解也燈豈非法自相相違因者問准此曾是有法自相相違因過如何言法答因緣而是所諍心非所諍故但違非違有法量云心不能自然因喻同前燈由彼俱業等者由初禪中有苦受俱或彼火炎二三禪中喜樂俱咸各風災燈不爾餘由引此言何用者此說意云若非此生自為引因即攝論頌枯喪由餘引之頌言而無用作此釋應撿本疏燈有相符失者於言難應實反為此雜穢土難有相符失我已許實反故燈三災可用者反此三災諸有情等設來誰處於此三災還得有孔穴大等用燈改最珠力者為有神珠是於身上令醜陋者而得端嚴除纍別者燈法師自云至初解為勝為淄州古師在西明邊問西明疏難西明第二解西明法師自云若爾初解勝也初解如餘抄燈第八無別出生生等者此意說云第八無所依根等所以隨六但法處如三科章當辨此義燈且說見等此說意云五識所變皆是有對文中且舉眼識一介例於餘識卷第四論第三燈惑泛明等者問此與評有何差別答前約緣境今此後釋但泛言緣不泛別燈又通他顯業過亦未離者即眼業等不通於他除心所等應皆准悉燈問觸謂三和至雙名體等者此問意云准論文中觸謂三和及其返異此文皆以辨其名觸境為性此文方是顯其體性今此等文為總顯體為并辨名谷如燈說云若依有部正理為正者此法師斷由正理言將入現在影似大乘在種子法故正理正燈即雜心至同於正理者此說意云准雜心文得因正理在於生相又云若即如彼者若即加彼依於現者即是不正燈則色等五境者舉業其色境等自餘境燈無法無有情為障等者無別法及無有情以熟為其障名等無間燈不尋因果至諸可怖事等者有此因果顯引義邊方名道理唯識如文思惟而作燈俱舍二十引教等者此文以現應定俱舍於二十中約教理應撿俱舍燈應名去來中名為現者前前多念是過去中未來相以決定者過去中現在之相故名去來等等已受用因未已受用果者問種子生果既是同時如伺言已受用同答據果生之時因義已成熟意所以作此說燈眼智明覺至親者今等者意苦謂諦諦下各有四四各通三世也燈若經生即亦不退者名得果以而經於生即不退先於聖果大衆部退亦聖果餘部應知燈不爾以外皆增者此說意云大悲菩薩十地滿足已若更增進即不得定經三大劫修行滿足大悲菩薩無成以斯更更增進有何最極由此故知除大悲也除此大悲十地滿已除皆增燈本云至不通果位者此意說云論中但說能藏及執以通果故不說染熏及所藏者不通果故燈離無我執至執定通故者此釋藏也有難云果位之中如何得有我執等云云故有此答燈不爾至有雜染法者說意云若但簡雜染能藏及雜染下文何用有雜染法燈若如諸釋不假別文者除師釋賴耶三藏別引餘文及以義解今難意本論若無別斷爰引文既自具何假別文燈不可取藏至能藏之義者他意由能藏染即此染法是能藏義燈非捨能所藏之義者西明白馬俱得捨體義者體義燈又若尋伺至思惟真如者瑜伽論說尋伺緣如名思惟如今既親緣何欲思惟故與論違燈如見道無漏至鏡智亦爾者此例意云雖定見道通五地有正起之時唯第四定唯第四定餘四地中無漏見道必竟不起今鏡智雖通餘地起唯第四餘地之者亦必不起如唯識抄燈設無何失至其諸地易故者此並西明漸遂解釋得佛身中無眼耳通及定也燈作他不定過如何遣者次小乘師就大乘宗而作不定大乘是彼小他故不定量云第六意識為如五識轉識攝故亦有別依為如七識轉識攝故六無別依燈同喻一分所立不成者六識為喻第六識用七為依故識喻望所宗無一分也燈又亦未諍受熏等者義雖他不許令成差別然但諍依不諍熏等非差別稍難燈亦不為過理如前辨等者相違決定由喻共許今言自許故能非緣燈猶如有一至不應理故此意說云如一時中六境俱至諸識各欲見聞嘗等如何得有初生一識燈然四業至第八者初二第八後二知此說意云若有第八四業可具若無第八如何四具燈又復此論至總離別故心雜染者是總識自餘說等是識別義餘思准可知燈今謂是過至故有法過者此難意云真性之中說皆終一切皆空如何得言真性之為法定中有燈若取諸法至俱違宗過者自許皆空今取諸法非定故一分違有部唯實不彼真性非但自違并諸法故名俱違燈前宗記故者即釋因無過所以立空緣生空名符宗無燈若以實幻為喻者中為兔等此是似幻而是緣生執為實有此心實幻而非緣生燈諸大乘經至中宗第八者大乘同信若依勝義即令一切者皆總除何故唯破第八一也故中心觀論道理難燈有無本自二即辨至世諦等者世俗勝義名為有無經說此二本自二別不棄世諦違諸教也燈輕安大種者由得定已引得類四大種能令自安適是故名為輕安大種燈如人中得起天等生得善者問生便得名生得今既未生如何言得答生便得者不約感果今據感報未生亦得不爾如何感天等報燈二說前正至如煩惱等者此意云如人身中煩惱燈種別不說得定此屬也此屬於天善亦如是故難起燈總聚亦假者據一慧中分三總說與前總者而有別細撿前說燈但舉三者初雖說五治但舉三今難治也燈細謂愛取有生自體名粗者此約生果有遠近別分為粗細燈雖觀老死至未為喜足者此意說云雖觀老死名為現在觀至受受等而為苦集而未觀彼未來苦果及未來苦果集因未以為足燈謂遍逆至齊識退還等者此釋觀於未來苦於現身上觀於當來識等果種名為當苦而更不觀未來之集何以故知現苦果而是生准當苦果且由集起所以不觀但至於識及至退還大意如是今文中言集諦由誰而有苦此文以誤合言苦諦由誰而有更勘燈答雖名通定等者此答意緣梵王等雖是通引同有漏故相隨於上餘可准知問通引既同彼食段亦應通於上界答通引雖同漏無漏別不可相例或又菩薩實蘇酪等於下有漏不能為食但為增上引欲有情所變香而為其食故不通上如次前說燈能與後後等者撿彼論攝受別義者今眼定等是別義燈既許有段食經何不說者此難意云定中有食如何次下引入定經但說表等者不說食耶燈設兼引大亦復無違者兼四大也燈色持不遍者無色界中而無其色以為能持故不通也燈又難有部至說行能感者此難意云識位之中有異熟識色從於識名為異熟識位中之無異熟色從於誰名為異熟說行能等感廣如疏述燈安慧既許自證分種等者第八自證傍生十八又云若自證者即是八識各自證思之取前燈集云至感果用者此乃要集救西明說感相分業種名感相種餘思可知燈西明云至亦有所依者彼難意云文中正釋俱有取依何故乃以因緣為例彼釋意云且淨月師以前三師不立種依故今義准而令得有取諸法救別成三師若今取即但三師應撿彼說燈今謂此情至故非取依者此撿意云疏主意云初後五種與前四種而以相攝不可決定具其四義即今餘三何須前義者決定等四淨者可悉燈言相須等者即三義中之一義也就此一中而有其二是瑜伽文燈除轉輪王必起貪愛等者居轉輪王初胎時而能自知故放父母胎不生貪嗔住胎而即不智若爾如何言命終心而無種答此言中除末心之時彼言命終亦不相違燈此中應有等流等者此意說云此論中令有等流而即今是心境俱緣句中所收已前已明等流心意今此等流在彼中攝所以但在境緣句收燈何要戲忘等者此難意云若不約受具何法指此妄表天燈佛使等者佛所為之事未了以來必不自害亦復不為他之所害燈此意以別相名與而能斷惑等者此意說云於生空處起總相心於四諦上而通作有無常共相如此之智方能斷惑除可思准文應撿彼及論疏燈所由所依是有覆故謂心王是有覆心所依心王隨王亦有覆燈問緣現可爾緣過如何者此義稍難若言是妄現是善心若非妄念既不能憶而是何耶若此稍難故令思惟耳卷第五燈無故不說等者此意說云第七八識義誰同有燈善異者此即之苦其無及相同者而即不說應撿彼疏燈法執望二乘至二位中無者菩薩二位法執不行名無望定二乘非是染故二之中為無燈若不入滅者是其初解設入不滅者是第三解燈要集云所知障定者此說意云所知煩惱同種決定必所知定燈非多心者此說意云言起一心義說如異熟心起威儀時即名威儀餘三時亦同此說燈亦非第六識立第七故者本意成立有第七識所以不取第六識也如因明纂更廣明之燈生空後得至故云無者正起生空後得之時有漏之相而即不起無此正相故亦名無燈漏須須決擇分者問何故不說順解脫分者答舉勝攝劣應撿彼論燈不爾漏俱非漏因者答爾不許與漏俱如何得言是有漏因燈非於定中至何者者此疏意云若其不許定中尋求而後若為次即是漸燈若依正求等即瑜伽論名為正本燈今者解云至現此同失者此即答前過非勝境問云雖不定現比同等難意如是思之可悉燈意緣聲時定為無所有者此意說云為同耳識熏欲聲種為不同耳別熏放無所有種燈俱舍第七從通果心無間生等者俱舍論說有二十心而相生起此言通果欲界通果燈當知是彼影像像類故者相似義通果自性是上界法云欲界者似欲界故名為欲界燈初文即後二文非別者要集意云大論中而有二文即為兩釋今非意者後文即是釋前故而非別六十九文燈又有欲界至福果所致等者此意云六欲諸天及一分人起神通者並由云生福德力故而能如是即輕王等是人一分此引文略後應更撿燈據預流七返有等者預流身中感七返有諸惑業等撿名有支一來准知除無漏故云一分燈不簡五義但有隨轉等者云不發業但簡第六識五識不能而為轉因但隨第六而轉起故此乃釋前不簡所以燈非於此中許有二解等者疏主以經說有樂言且為此例非許有樂而為兩解西集說云有說二解不悟本意燈然瑜伽至是故總說故者大論但言三受得者文言總故據亦今攝應部並二燈若依前會是轉者或攝論中惡趣文前而有會釋或是初西明或是燈中引文或本論引應撿燈如緣外境通三性心等者此意說云境誰無記而得說說通三性心何妨器是業感無記而能發等流之樂燈以不生無色根者由不生彼以未至而無欲煩惱及其色類但有所餘燈二據大乘有第七識起無漏說者大乘許依未至定中而現起無漏第七而為意根燈又如大乘至故有喜受者大乘入見要依第四初地既名極喜地攝故知第四得喜相應燈二云須經部師立者彼計爾所依思分立思是求舉本攝末今者觸法與餘為依故於舉本攝末燈此言界已自撿等者此意云論說言此自撿明取正因即是別相若爾者犯熏言失問思能令心造為業若離撿相如何作業思等取別引心作業心准撿相由所引生准撿相亦能作業又設解云心王取撿勝所隱劣顯勝但言總心造業於理無違心所翻此云亦不爾無文說言心王取故依前解燈若強為難返例等者小乘若強舉前難云大乘即應返例於彼言作意令心趣異其例可知燈然等引寬等者問等至等引俱通有無何故等引獨寬稱答准大論中是總餘是別等引等諸功德法故寬名問何以等引名總攝功德耶答如名起義由能引得諸功德等引而支寬稱餘則不然相傳釋定等至通有無心等引唯有心非也論六燈境業小異彼云者彼雜集論合更有漏已如引之應撿彼論定顯燈業果即諦者業果即在四諦中攝名為即諦攝者即是顯揚不開雜集燈受戒者隨護他心等者五十三又約此義受戒人護於心應更撿彼燈別境不定二各少分者此二之中有是隨惑故言少分通隨惑者是自性斷燈然所緣斷或不生斷者此意說云所緣斷者四斷之中不生斷攝燈且據全說者意捨通八非相應皆是無漏故不名全者五相應無漏所引總名無漏故名為全燈一云得起依現身者問設不起彼有何過答無文定判道理之中可容得依非要後起燈我勝慢類中攝三種等者此意即說於此處起我勝慢非我勝慢有其三種燈二多不全依至故即喻者舉此意云於勝計等等計勝過慢具依此二而起故名為全我勝慢但依一法上生我勝慢類依三法起故名為過燈即四依三品生者於前三上更加有劣及無勝等故成其四配屬思之可悉燈不爾有疑者若其不如次上釋者即有疑生言可得是慧者此即是疑燈依諦少釋者四諦門為而解釋燈理已定故名不須故者此破意云言有無者道理已定何名不定異者二宗名為移轉是名不須撿彼燈四分初二至苦受等者二論中分之中但明初二有想等中但明有色及苦等而不全明燈答依宗計等者即依小乘解諸見等執有邊者即常見收執無邊者是斷見論文省故但言有無執亦有即是一分斷常見攝餘可准知燈據彼自界等者據彼外道自世界說燈又遍分常一唯起一者即是一人取一見燈何種智婆沙等中說云諸見中有其智答如文燈由勢分力不許無因者全無之者而是有心復雖不憶由昔時有心勢分不執為無無義因禽獸等義同默利禽獸造業雖非此義仍須撿彼燈貪分雖癡俱說與癡相應等者依貪分癡而與立俱至相續者由現愛力今不斷絶中有相續燈云何七日方不行者問若爾第八何要七日第一度死答第八總報由其薰力至返七日而即便歿前六不然不相例道理猶難思之問明說云六識分行捨色身不答捨俱何過難二俱有失若云捨者第六既世之得住持而何故捨若不捨者如何得言七日一死并中夭等故知說非應撿燈餘五准應至是何行斷者還作下上粗靜等相以此五種別有功能餘多不說若其五不作二相而於或前一作意六行之中作初二行其餘之惑而迷誰斷須知矣燈觸證少分者於勝功能而能對觸證得少分名觸證小分觸是觸對親證之義燈果煩惱斷已等者最下品惑果煩惱斷證可知燈攝樂作意為二品解脫者問攝樂作意是中道何故隔其觀究竟而都取耶答此釋正但由六十二中說云攝樂作意通四道故且作此釋燈六十二云至或為證得等者此釋起四道取由又是遍滿所緣者而能遍滿緣所境名滿所緣燈次於不來故者此意說云設三品不起慢謗故執第四而為極果更無有由前三品許而更有生生三種有中有起何須起慢是有生喜名未無生燈行總數別類中者即類中隨行三八前所指也文疑略後更勘本燈向至隨念計度二種者上座部師意依色根彼論破云第六意識應隨念計度分別依色根故由如五識無不說五又答至即許自性分別等有此答意云若其不許五有自性亦令破六自性分別既不破此舉五為俞明有五得燈五在第六至計度攝故者七除前二餘在第六除前三後四之者是計度揚第七相應燈准瑜伽釋至不違第七者後四分別能緣行相及所緣境不違第七故通第七燈瑜伽通緣世雜集唯未來者問前前大論無相分別緣於過現如何今言通緣世答前約得與自性隨念二種相攝言通現不無唯言理實而定通約三世故與雜集無相攝今且録排以寫燈三於識空不通行者今別行相諸識皆有尋伺之者或有或無若言分別皆是尋分別所遍識失燈此皆上界及異熟心起等者此意通果之是上界法悔不通上故不得俱壞等者異熟心起是變化單亦不悔上之文言言總也道理隱稱雙單之者如者卷釋燈若分有至無色應立者非是分有尋伺二法名為分有而分有餘禪支之法名為分有應撿禪支義無色地法即知其分燈一通諸部即唯是尋等者此通三乘明思惟體大乘但約因位後得下亦云唯約大乘因果說者文相可知燈瑜伽二十九至皆是初體等者此論文並證後得為正思惟若非後得如何能取起種種言論安立慧等種種諸言思惟惟性者即計算等以思惟而為其性又言立二名正見等者能安立慧及其取證含此三種名為正見即如證者是其所證燈慧蘊攝等者五分法中慧分攝也燈九十八云至名為八支聖道等此論文並證根本為正思惟若非根本如何得言以非安立及無餘斷一切煩惱以此故知取根本智言除諸惑支者惑依於思分位假立故除之也燈當知此中至皆是後八支體等者此總結前所引諸文配屬二智行相可悉燈若爾至及對治支此難意云尋伺俱依思慧上立如何得有粗細等別答意云還依思慧粗細功別分粗細等燈表色至即彼逈色者此之表色由依逈色而無障而方能動作故以逈色而作可依又前言作相者即此表色有形相故名句作相更撿三科等章燈離餘礙觸方處可得者表色即有前所餘師而何者無前觸餘而故知名逈色燈問若取逈色至立色者何故不立此之逈色名取造色難意如是燈欲令名中者名者言更無義燈漸次門故難重失者此師意云前文其重據四諦辨其王處後文亦然故犯重言今加王故無重失燈今謂不爾等者此意云前文唯約四王所後文亦爾不犯重言何者後文并具異難及相見等據此而并上前寬狹而懸殊如何得主犯重言失除四可悉燈本宗同中論文不說者一切有部俱舍論中許有中有宗輪論中即不言有何責引彼宗輪論中所說以義證有中有不有非是不許有部中有若上本部所許義同異部論中更不別說但假部同為此義燈雪山同彼豈有中有者此難意云彼宗之中無其中有餘同有部有部論尚無中有雪山寧有燈異熟定及時報者異熟者異熟即是其報有言異熟有處報故此雙言燈文慈定至現受者由以慈小留入於定名為慈悲身證俱解地上菩薩皆總得而言等初見道及餘大定於等人而行不還及起供養皆招現報言執者而是別報燈謂作業決定至位定者此即配前所言三種又云作業至是不定此即法師釋前二種前言作業中通定不定前言定處而是不定言分位者即是時也有處名時有處時有處名位故雙言燈第二時定報不定者問如作惡業來生令受趣即不定若生人中而逢勝修諸善業往業而不受之此等即是時亦不定如何得言時定報不定答若逢勝緣而不受已必更於爾時重受亦名為定餘皆准此燈下文言有何得別說故者此意云若後二業時報俱定即受報亦即攝持何須別說既別時明非俱定燈既云感得至故知是通者要集等云異熟決定時亦決定法師意云異熟雖時不必定時若亦定雜集亦念欲時決定彼論但言感果決定不言時定明心此通定不定又云不爾至不造惡業耶者此意說云於此報定異熟身上得道惡業明先業時而即不定時難復應更問燈今謂不爾至業有五種者此非意云顯揚既云等有五種故知問不唯是報燈即是前三何須別說者五業前三而是而何分別說前問耶燈各當不初乖者相攝者此非意云各自相當不許相攝乖角之者何乃相為故不可燈據造不善言為正法者如外道算釋生算將此為真正之法故與此別燈問至何不感者此問意云初在人中修得此定後生色界更後重起彼色界中無想俱慧思能招得彼無想果不又云不可生後同招者欲界業色界生業餘准先知燈不爾至應重生彼者此意即說不作此解應生無想酬欲惑已更應重生酬欲感咸界業既不重生故如前釋燈若初師至不得重起者即三種名為三釋燈生無想者至生重生故如前釋亦名後報者初修退後生熏起一生即感彼無想天從起說亦名後報欲界名下燈西明云已五十一者問西明說云四萬二并十千合之為一其四十心并及十色為五十一則於理何妨而言不得有五十一答仁王般若及華嚴等但言三十雖言十信不離十住准此諸文無四十心可不成五十一燈頓悟菩薩至二說別故者許初地得滅定者即有其十許七地得即四但許初七二說別也燈或四十七至或四十七者即不還人欲界或書上下地各九上十二或有斷得色界三上即四十五餘可知之今者助明至可非初起者此意說云無文而障欲色天之中得有身證設無身證即慧解脫許在欲界此人回心後定不能起於此定問未入初地可不能也答據說不障地智上有得起燈即是後世塢陀夷也者即此要集不悉本釋如塢陀夷不悟舍利弗談此要集名後塢陀夷燈此論後師至必為正者無文斷此二師說故燈但訶沙彌不可說意者此中總意若其無色非意成天塢陀夷沙彌何故起諍明知無色是意成天方始起諍不誠意者如前可知燈西明至令八滅定故者此師意云定性二乘不能求於一切一切智故深密等言我於凡愚不開演即不為說阿賴耶識今言為說令此二乘入滅定故燈今者問彼至已密意說故者此意即說此文引文皆無有處言為二乘令入滅定說阿賴耶涅槃經唯說六識亦無有說阿耶處若論密意即阿含等是已說訖故知不可卷第六又設兼至亦無不定有真觀緣離心可得真而為不定燈答有二義至實與非實者此之義兩家共許無熟他失但取此二以之為喻不論鏡像實與不實燈難他心智等此舉論中外人難二釋又云今緣自心非觀緣他心者此舉論中答二釋燈非等引地亦復如是者此從喻善惡心業以其果取感之命以夏影燈以前相故者以是前色境之相故燈色家收釋所以也燈本識所變為所餘色者為實五塵不名影像是像色餘名所餘也燈西明云安慧三釋等者西明假敘此二師說不斷得失又云安慧至故名唯識者此並法師破不正及自述正述思准可解燈答緣影不極成攝云見質者問薩婆多師豈許境中還見自質答彼師雖許鏡中像色而是前有由鏡之中并見自質不作此解道理即難欲前燈欲界經生至受變易生者問有何所以經生之人得非擇滅變易答由曾經生總厭生死故得如是燈應五那含人舊等者此那含人由五品熏而生淨居不言直造亦熏故取為例燈或三地至亦在其中者八九十地名為三地既言三地處於淨居所以第十亦在其中既第十地在淨土中云唯佛覺者佛即是意說淨土是佛居又云非得靜慮境界者即意即說其淨土者非得定人而得止居後非靜慮境界所攝今菩薩等名靜慮又云想相說土至由文陰故者此會意云對法論中雖定以三佛通言不簡何佛文相總故據實菩薩得生其中燈餘本不獲者慈恩所引七十八等皆是總文要集撿彼引二受別不見顯者故言不獲燈然自在宮至處所不定等者此師釋及餘准知也燈隨其所樂至先善取彼行相故者由先已能善取上地諸心行相復於欲界生得能和學者取無漏心燈鄰彼勝心非起生得者上界方便而是其勝不可從上界勝心生下劣心此釋前解好所以燈自上界土生者此明不善自從生次言不善而能他生得等言言從他等皆准此知彼從他等亦爾燈從色有覆至取障說者此意即說異熟生者據定性說何以故不定性等異熟生據所知障者是有覆收定性之人即非有覆為今四以故約定性問不定等人何無此四答雖有四心由定性非有覆染故分別明即從色界有覆心生得善威儀心異熟心生今欲不善燈不善起至起雜故此釋上二方便善及業異熟生不善所以燈有覆同十二如第二師者即前不善二說中第二師義燈說一切亦無論中有此師燈此下染至無間而生問由染污心方始退定即下染心唯與上染無間而生如何言善答此文中含退定念而說之退定之者染無間生非退定者善無間生命終之心通三性即無其妨燈從二心亦可起二者從威儀及初染心起上此二又云工巧即學無學心者此別十五心之名也若有工巧即有十五若無工巧即但十四前之九心威儀心及方便為學無學二無間心說前九心成其十四故言不定燈威儀生得異熟或總不得等者此第二釋思准可解燈無漏相好亦復如是者此說即說如佛之身三十二相名無漏相例意可知燈若有善修四神足者此者及說此回心者據實定性亦有善修四神足者問能近燈復云無相至同時義說者據三心見道各為無相疏主不許見相同時要集謂言疏主許燈傍生破斥餘者可知燈彼解世俗智初中後除等者配前資糧加行等而頂第燈要集至以量成立者師天說回心菩薩而於地前不起無漏生空智者此無漏智是彼界種性攝故由此回心而於地前不得起彼無有誠文遂量成立非燈辨燈即總相說至一分別能入彼言能入者三根之中依句根總皆得入言不能者但依捨根不依喜樂以彼不得本定故但無近分故無喜樂問論言根除樂取意而為八根難詳更撿乃問燈或據鄰超等者此意說云若依鄰次不伏樂根入第四定及色若超越者此即不通餘皆此論第八卷燈親疏與遠近者親者即近疏者即遠燈語依處等者雖作二解還取本釋兩釋為言第釋初解約彼以義示第二釋中方胎正解如疏燈言五義至六由說故者問前但據五解何說六答前雖標五解兼說六於理無違燈論多依彼開聖言故者此意即說他受用身是平等智為他說法起言說等而無處攝燈亦約遠近至即是望遠者現生老者名為生長准知下上此名近未生老名為餘生此名遠燈即據體類次第等者種子現名為體類次第并者宜准可知燈豈相熏彼見種因緣乎者難意云豈此現相熏於見種不名因緣若因緣即性決定燈若闕若離是不相違者此即說相違法闕相違法離名不相違燈然法士用不攝無為者問若爾何故前云若約勤勞名士用答前約智證此約其體亦不相違燈四云至反相爾者准此標中化此解中除緣故於相後三相緣皆不違相今言見分緣復反疏許爾應撿彼疏燈說果緣化等者西明意說佛果之位而能緣他應撿彼疏燈豈欲界業至別趣者此意說云豈可欲界任性之業不盡別緣即別趣受若爾別受與定何殊不名不動燈未潤之位分為生引者此文三入總應言未潤之位分能所引已潤之位分能所生燈言現法即前七後法即後三者即老死三名為三愛取三支而不定故非前後攝如疏等燈雖唯說彼至不感惡取三支而不定故非前後攝如疏起故者此意說云雖言放逸不感惡起兼相說於實而談得感惡趣文言略也但舉違文可會之意如是也或但言感惡趣故除不字應撿經文燈求當涅槃至即內法異生者外道可知內法異生雖水涅槃不攝道理亦名為於彼對治起對治相燈由隨眠任意取捨此意並解語非經論文燈異彼外法其非任內言意彼者異彼內法言是故唯依等者此意說云外法意生依於雜染緣起次第不約內法燈要集云至不造總業者如前卷中此義不勞學者准彼應悉燈准此唯有遠緣引已者此意即說福不動行癡既不俱乃是以前遠緣引發餘思准知燈加行支中前假說色者即身語業而是假色燈今助一解至亦得為名者問色除五根由有扶塵以為色支名謂蘊若除其識即無四蘊何得相例答但言四蘊總是名收不言名要具四蘊雖無其識何於理何失燈亦違十地子果俱時者彼約生現名為果時現行未起名果時今未生現即名二時故與相燈瑜伽第九至如何會釋者此論意云由有其境而受遂生即依受而生於愚言第二者內異熟果而為初外增上果故當第二燈非緣受起愚至受之因故此會意云不是從受而生於愚但愚是彼之因名受果愚燈此受支者緣境生受是不受支燈又取受字等者此即釋彼論言受果愚之所以燈不得說至先業果故論中但言二境是業果故不得說是受業果燈若爾至受先業果者此意說云論既說云受先業明不得受為外境增上果也燈若爾緣事應非見惑者此意說云第二俗是五蘊等緣此之惑應非見惑何以緣事故義如文燈西明舊疏云者西明云疏要集斷加此說者是疏明燈若上界至非自他緣者此師意說若不約欲生惡趣者并據上地即有斯失若上界臨命終時起下地愛上下遍若還緣上即不得定緣於當生自地起愛故知約命并已生說燈俱引大論一切根相應者許者起中而有任運貪瞋癡三并我等貪即是愛故取為證燈問既有上地至同彼種故者此問意如正無明支上地行唯近分定此近分中雖有種而不發行內法異生造不動愛心癡不用不起隨眠而發於行如近分定要下發上答如文說燈若可云思有三非一等者此意即不得定思而有三種即多事不約色聲觸等雖多不故餘可准知燈愛取相例等者以愛取等生老等而以相例今定愛體用等是答也有此別故不同生等意撿彼故燈漸修下三禪各三者下之三禪亦名三品而以熏習練磨其心以為方便第四禪中方指滿燈即為定得自在至淨居者內於定而得自在為受法樂遂能有漏無漏雜修言得自在配受者生淨居故受生至燈四有漏至資供命果者如無學人命長福短於等中佛役於今而猒於福福長命短如延壽法燈後一念有漏為解脫道者問如何無漏為無間道滿而為解脫道乎答緣於理無漏無間無漏解脫今緣事問重禪故故得有漏為解脫道理事別故燈及以解愛等者即四蘊之中初愛是燈正論大師者由顛世尊能善論量一切法遂自稱為正論大師燈自屬自故者因我之身名屬因燈難陀如何別自等唯一見更無別用不可難陀安慧師燈若見能緣至有不定者為如自體是能緣故更有別用為如見分是能緣故更無別用燈本質不定即除無為等言非定有無名為不定有復非依他何除之燈併國外道師偈者善要一切是此外道所說偈疏言偈師而似誤也燈不爾此言空無所益亦者此十八界種雜亂是無所益燈答緣自證分名俗者具自證分前後相緣緣他自證或一剎那自證緣皆名緣俗燈分為凡聖者此師意說據實菩薩非親緣如為命分其凡聖有別言緣如等燈現比量准可知者無明稍微即現量橫思度邊即名非量燈然陳那至就他為他為語者北會陳那觀所緣論就他小乘及外道等言無非所緣等餘可知燈安慧許至所遍計故者設兔角等無法為所緣緣能所漸諸思之燈豈見障外色者如無汝遠隔海山等名為障外魚山亦爾是不思議道理極難燈尋聽此解理然者此意燈主自說云曾於本師講下聽聞作此解計許實於理無違要集據緣言唯諦實此即不別緣不成故此文似解或初二字後之四字為其兩句義亦應燈亦攝彼二者遍計圓成是所攝二二故唯第二依本疏正者其第二釋與本疏同此不牒出燈無願至餘諦十者集道各四并者下二名十二行相燈復有重作三解狀所觀境唯是有漏以無漏定是欣聖道所以不依下二云空空乃至說云無無作重法也思准可知言不體解脫應撿俱舍燈唯三洲人者此能得人依十二地者此所依地八根本一近分中間及欲界未審之燈但言無常無樂至是空算地者唯取後二名為苦空雖言無常不說是空苦行可知稍難燈滅下四至是空無相境者此明如如相攝行相道理下四行至是空所行境此是正智相攝行相燈據餘四云等者五除相計之四也配屬可知燈喻初三諦至有非處名故者通能所詮非名相故故言少分燈合之第七至十二一釋前此大似錯若若十二事開合成十一如何言十文顯揚論與十五同合十二別合十三不可得言十一十二又七十四第八復次十二得知開十及十一十二而是非也更撿燈然所觀境至未親證故者其所觀境未能證但反相緣復能為向證真解脫燈亦定生者欲勤心觀四苦因能生於定心亦是定名定生者餘相從成燈以總簡別等者行是總勝是其批云大治元年四月十日興福寺西院書寫之沙門範經享保十九年甲寅六月十七日書寫之功終寫本舊書故文字之體難見分粗令推寫畢後覽之學者正之云爾賢聖院法眼秀英十九臘三十一歲
